<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk – EduFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-text">EduFlow <span>BETA</span></span>
    </div>
    <h2>Selamat Datang Kembali</h2>
    <p class="login-sub">Masuk untuk melanjutkan perjalanan belajarmu</p>

    <button class="social-btn">
      <span>🌐</span> Masuk dengan Google
    </button>
    <button class="social-btn">
      <span>📘</span> Masuk dengan Facebook
    </button>

    <div class="login-divider">atau masuk dengan email</div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>
      <a href="#" class="forgot-link">Lupa password?</a>
      <button type="submit" class="btn">Masuk ke EduFlow</button>
    </form>

    <div class="login-footer">
      Belum punya akun? <a href="register.html">Daftar gratis</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
